repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: eslint
        name: ESLint
        language: node
        entry: npx eslint
        args: []
        types: [javascript]
        pass_filenames: true

      - id: npm-test
        name: npm test
        entry: npm test
        language: system
        pass_contents_only: false  
        pass_filenames: false
        files: \.(js|jsx|ts|tsx)$